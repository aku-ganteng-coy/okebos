<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GAMBAR KEREN</title>

  <!-- PREVIEW LINK WHATSAPP / TELEGRAM / FACEBOOK -->
  <meta property="og:title" content="Daftar Disini">
  <meta property="og:description" content="Partnership Provider Resmi">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aku-ganteng-coy.github.io/daftar/">
  <meta property="og:image" content="https://aku-ganteng-coy.github.io/daftar/logo1.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 15%, rgba(255, 210, 0, 0.18), transparent 20%),
        radial-gradient(circle at 90% 20%, rgba(255, 180, 0, 0.14), transparent 22%),
        radial-gradient(circle at 15% 85%, rgba(255, 150, 0, 0.12), transparent 23%),
        radial-gradient(circle at 85% 80%, rgba(255, 220, 80, 0.13), transparent 24%),
        linear-gradient(180deg, #030303 0%, #000 55%, #050505 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* GOLD SPARKLE EFFECT */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 220, 90, 0.9) 1px, transparent 1.7px),
        radial-gradient(circle, rgba(255, 190, 0, 0.45) 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255, 255, 255, 0.28) 0.8px, transparent 1.5px);
      background-size: 80px 80px, 130px 130px, 190px 190px;
      background-position: 0 0, 45px 70px, 90px 30px;
      opacity: 0.38;
      animation: goldSparkleMove 26s linear infinite;
      pointer-events: none;
    }

    /* DARK VIGNETTE */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 35%, rgba(0, 0, 0, 0.78) 100%);
      pointer-events: none;
    }

    @keyframes goldSparkleMove {
      from {
        background-position: 0 0, 45px 70px, 90px 30px;
      }
      to {
        background-position: 240px 180px, -160px 230px, 210px -140px;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
    }

    .top-image {
      display: inline-block;
      margin-bottom: 28px;
    }

    .top-image img {
      width: 560px;
      max-width: 92%;
      height: auto;
      border-radius: 14px;
      transition: 0.25s ease;
      filter: drop-shadow(0 0 22px rgba(255, 196, 0, 0.38));
    }

    .top-image img:hover {
      transform: scale(1.03);
      opacity: 0.96;
      filter: drop-shadow(0 0 30px rgba(255, 196, 0, 0.55));
    }

    .button-wrapper {
      display: flex;
      gap: 28px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      width: 135px;
      height: 46px;
      border-radius: 15px;
      background: #ffd400;
      color: #111;
      border: 1.5px solid #ffd400;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;

      display: flex;
      justify-content: center;
      align-items: center;

      transition: all 0.25s ease;
      box-shadow: 0 0 12px rgba(255, 212, 0, 0.25);
    }

    .btn:hover {
      background: #050505;
      color: #ffd400;
      border: 1.5px solid #b99200;
      box-shadow: 0 0 14px rgba(255, 212, 0, 0.38);
    }

    @media (max-width: 600px) {
      .top-image img {
        width: 330px;
        max-width: 95%;
      }

      .button-wrapper {
        gap: 18px;
      }

      .btn {
        width: 115px;
        height: 42px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- GAMBAR DI ATAS TOMBOL, BISA DIKLIK -->
    <a href="https://mtwin.link/telor" class="top-image">
      <img src="mpotwin.png" alt="MPOTWIN.TOP">
    </a>

    <!-- TOMBOL -->
    <div class="button-wrapper">
      <a href="https://mtwin.link/telor" class="btn">MASUK</a>
      <a href="https://mtwin.link/telor" class="btn">DAFTAR</a>
    </div>

  </div>

</body>
</html>
