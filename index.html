<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAASUK</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #202329;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-daftar {
      text-decoration: none;
      background: #ffd400;
      color: #202329;
      padding: 16px 55px;
      font-size: 26px;
      font-weight: 900;
      border-radius: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 7px 0 #b87900;
      display: inline-block;
    }

    .btn-daftar:hover {
      background: #ffffff;
      color: #ff6a00;
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 12px 25px rgba(255, 255, 255, 0.45);
    }

    .btn-daftar:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 3px 0 #b87900;
    }
  </style>
</head>
<body>

  <a href="https://mtwin.link/telor" class="btn-daftar">
    MPO TWIN
  </a>

</body>
</html>
